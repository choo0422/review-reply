<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="리뷰 답글">
<meta property="og:title" content="AI 리뷰 답글 생성기">
<meta property="og:description" content="AI가 리뷰를 분석해서 맞춤 답글을 자동으로 생성해드려요">
<meta property="og:type" content="website">
<meta property="og:image" content="https://raw.githubusercontent.com/choo0422/review-reply/main/thumbnail.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://raw.githubusercontent.com/choo0422/review-reply/main/thumbnail.png">
<title>AI 리뷰 답글 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --coral: #FF6B6B; --coral-light: #FFF0F0; --coral-dark: #CC4444;
  --mint: #4ECDC4; --mint-light: #E8FAF9; --mint-dark: #2EA89F;
  --yellow: #FFE66D; --yellow-light: #FFFBEA; --yellow-dark: #CCA800;
  --bg: #FAFAF8; --card: #FFFFFF; --text: #1A1A1A; --muted: #999;
  --border: #EBEBEB; --radius: 18px; --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 48px; }

/* 잠금화면 */
.lock-screen {
  position: fixed; inset: 0; z-index: 200;
  background: linear-gradient(145deg, #FF6B6B 0%, #FF8E53 40%, #FFE66D 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px;
}
.lock-logo { font-size: 56px; margin-bottom: 8px; animation: bounce 1.5s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.lock-title { font-size: 32px; font-weight: 900; color: white; letter-spacing: -1px; margin-bottom: 4px; text-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.lock-sub { font-size: 14px; color: rgba(255,255,255,0.85); margin-bottom: 40px; }
.lock-box { background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.lock-box p { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; text-align: center; }
.lock-input { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: 2px solid var(--border); font-size: 18px; font-family: 'Noto Sans KR', sans-serif; text-align: center; letter-spacing: 6px; margin-bottom: 12px; }
.lock-input:focus { outline: none; border-color: var(--coral); }
.lock-btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.lock-error { font-size: 12px; color: var(--coral); text-align: center; margin-top: 8px; min-height: 18px; }

/* 상단 배너 */


/* 헤더 */
header { background: white; border-bottom: 1px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 10px; }
.header-emoji { font-size: 26px; }
.header-text h1 { font-size: 17px; font-weight: 900; }
.header-text p { font-size: 11px; color: var(--muted); margin-top: 1px; }

.container { padding: 14px; max-width: 480px; margin: 0 auto; }
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
.section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

/* API 키 */
.api-notice { background: var(--yellow-light); border: 1.5px solid var(--yellow); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: var(--yellow-dark); line-height: 1.6; margin-bottom: 10px; }
.api-row { display: flex; gap: 8px; }
.api-input { flex: 1; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text); background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
.api-input:focus { outline: none; border-color: var(--mint); }
.btn-api-save { padding: 10px 14px; border-radius: var(--radius-sm); border: none; background: var(--mint); color: white; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
.api-ok { font-size: 11px; color: var(--mint-dark); margin-top: 6px; display: none; }

/* 입력 방식 */
.mode-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.mode-btn { padding: 11px 8px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: var(--muted); text-align: center; }
.mode-btn.active { border-color: var(--coral); background: var(--coral-light); color: var(--coral-dark); }

/* 업로드 */
.upload-area { border: 2.5px dashed var(--border); border-radius: var(--radius-sm); padding: 24px 16px; text-align: center; cursor: pointer; background: var(--bg); }
.upload-area:hover { border-color: var(--mint); background: var(--mint-light); }
.upload-icon { font-size: 32px; margin-bottom: 6px; }
.upload-text { font-size: 13px; color: var(--muted); }
.upload-text strong { color: var(--mint-dark); }
.preview-img { width: 100%; border-radius: var(--radius-sm); margin-top: 10px; display: none; max-height: 260px; object-fit: contain; border: 1px solid var(--border); }

/* 리뷰 유형 */
.type-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-btn { padding: 12px 8px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: var(--muted); text-align: center; }
.type-btn.active { border-color: var(--coral); background: var(--coral-light); color: var(--coral-dark); }
.type-btn .t-icon { font-size: 22px; display: block; margin-bottom: 4px; }

/* 업종 */
.category-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.cat-btn { padding: 8px 4px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: var(--muted); text-align: center; line-height: 1.4; }
.cat-btn .c-icon { font-size: 18px; display: block; margin-bottom: 2px; }
.cat-btn.active { border-color: var(--mint); background: var(--mint-light); color: var(--mint-dark); }

/* 별점 */
.star-wrap.hidden { display: none; }
.star-none-btn { width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: var(--muted); margin-bottom: 8px; }
.star-none-btn.active { border-color: var(--mint); background: var(--mint-light); color: var(--mint-dark); }
.stars { display: flex; gap: 6px; }
.star-btn { flex: 1; height: 46px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--bg); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.star-btn.active { background: var(--yellow-light); border-color: var(--yellow); }
.star-label { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }

/* 사장님 한마디 */
.owner-input { width: 100%; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text); background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; resize: none; line-height: 1.6; }
.owner-input:focus { outline: none; border-color: var(--coral); }

/* 톤 선택 */
.tone-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.tone-btn { padding: 10px 4px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: var(--muted); text-align: center; }
.tone-btn.active { border-color: var(--coral); background: var(--coral-light); color: var(--coral-dark); }

/* 길이 선택 */
.length-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.length-btn { padding: 10px 4px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: var(--muted); text-align: center; }
.length-btn.active { border-color: var(--mint); background: var(--mint-light); color: var(--mint-dark); }

/* 리뷰 입력 */
textarea { width: 100%; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 12px; resize: none; line-height: 1.7; }
textarea:focus { outline: none; border-color: var(--coral); }
textarea::placeholder { color: #CCC; }

/* 생성 버튼 */
.btn-generate { width: 100%; padding: 16px; border-radius: var(--radius); border: none; background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%); color: white; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-top: 4px; box-shadow: 0 4px 20px rgba(255,107,107,0.35); }
.btn-generate:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

/* 결과 */
.result-box { background: linear-gradient(135deg, var(--mint-light), #F0FFFE); border-radius: var(--radius-sm); padding: 16px; font-size: 14px; line-height: 1.9; color: #1A3D3A; border: 1.5px solid #B2E8E5; margin-bottom: 12px; white-space: pre-wrap; }
.result-actions { display: flex; gap: 8px; }
.btn-copy { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: none; background: var(--mint); color: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.btn-copy.copied { background: var(--mint-dark); }
.btn-retry { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: white; color: var(--text); font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.btn-save-fav { width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 2px solid var(--yellow); background: var(--yellow-light); color: var(--yellow-dark); font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-top: 8px; }

/* 즐겨찾기 */
.fav-item { padding: 12px; background: var(--yellow-light); border-radius: var(--radius-sm); margin-bottom: 8px; border: 1px solid var(--yellow); position: relative; }
.fav-item p { font-size: 13px; color: var(--text); line-height: 1.6; padding-right: 40px; }
.fav-copy { position: absolute; top: 10px; right: 10px; padding: 4px 10px; border-radius: 6px; border: none; background: var(--mint); color: white; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.fav-del { position: absolute; bottom: 10px; right: 10px; padding: 4px 8px; border-radius: 6px; border: none; background: var(--coral-light); color: var(--coral-dark); font-size: 11px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

/* 로딩 */
.loading-dots { display: inline-flex; gap: 5px; align-items: center; }
.loading-dots span { width: 7px; height: 7px; border-radius: 50%; background: white; animation: db 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes db { 0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1} }
.error-box { background: var(--coral-light); border-radius: var(--radius-sm); padding: 12px; font-size: 13px; color: var(--coral-dark); margin-bottom: 12px; border: 1px solid #FFD0D0; }

/* 글자수 표시 */
.char-count { font-size: 11px; text-align: right; margin-top: 4px; }
.char-count.over { color: var(--coral-dark); font-weight: 700; }
.char-count.ok { color: var(--mint-dark); }
.char-limit-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-left: 6px; font-weight: 700; }
.limit-coupang { background: #E8F4FF; color: #1A4FAA; }
.limit-baemin { background: #E8FFFE; color: #1A8A87; }
.limit-naver { background: #E8FFE8; color: #027A38; }

/* 편집 가능한 답글 */
.result-edit { width: 100%; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: #1A3D3A; background: linear-gradient(135deg, var(--mint-light), #F0FFFE); border: 1.5px solid #B2E8E5; border-radius: var(--radius-sm); padding: 14px; line-height: 1.9; resize: vertical; min-height: 100px; margin-bottom: 4px; }
.result-edit:focus { outline: none; border-color: var(--mint); }

/* 취소 버튼 */
.btn-cancel { width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: white; color: var(--muted); font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-top: 6px; display: none; }

/* 쿠팡 모달 */
.coupon-modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
.coupon-modal { background: white; border-radius: 20px; padding: 24px; max-width: 340px; width: 100%; text-align: center; }
.coupon-modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.coupon-modal p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
.coupon-banner-link { display: block; margin-bottom: 14px; border-radius: 10px; overflow: hidden; }
.coupon-banner-link img { width: 100%; height: auto; display: block; }
.btn-coupon-go { display: block; width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-bottom: 8px; text-decoration: none; }
.btn-coupon-skip { display: block; width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: white; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

/* 히스토리 */
.history-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.history-item:last-child { border-bottom: none; }
.h-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.h-tag { font-size: 10px; padding: 3px 7px; border-radius: 20px; font-weight: 700; background: var(--coral-light); color: var(--coral-dark); }
.h-stars { font-size: 12px; color: #F5C842; }
.h-review { font-size: 11px; color: var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.h-time { font-size: 11px; color: var(--muted); }
.h-reply { font-size: 13px; color: var(--text); line-height: 1.6; }
</style>
</head>
<body>

<!-- 잠금화면 -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-logo">🍽️</div>
  <div class="lock-title">리뷰 답글 생성기</div>
  <div class="lock-sub">사장님을 위한 AI 답글 도우미</div>
  <div class="lock-box">
    <p>비밀번호 입력</p>
    <input class="lock-input" type="password" id="lock-input" placeholder="••••" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button class="lock-btn" onclick="checkPw()">입장하기</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<!-- 메인 -->
<div id="app" style="display:none;">
  <!-- 쿠팡 모달 -->
  <div class="coupon-modal-bg" id="coupon-modal" style="display:none;">
    <div class="coupon-modal">
      <h3>잠깐! 쿠팡 특가를 확인해보세요 🛒</h3>
      <p>아래 배너를 확인하고<br>답글 생성을 계속해주세요</p>
      <a class="coupon-banner-link" href="https://link.coupang.com/a/egBt7O" target="_blank" referrerpolicy="unsafe-url" onclick="onCouponClick()">
        <img src="https://ads-partners.coupang.com/banners/870271?subId=&traceId=V0-301-879dd1202e5c73b2-I870271&w=320&h=50" alt="쿠팡 특가">
      </a>
      <button class="btn-coupon-go" onclick="onCouponClick()">🛒 쿠팡 특가 보고 계속하기</button>
      <p style="font-size:9px;color:#CCC;margin-top:8px;">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>
    </div>
  </div>

  <header>
    <div class="header-emoji">🍽️</div>
    <div class="header-text">
      <h1>리뷰 답글 생성기</h1>
      <p>AI가 맞춤 답글을 작성해드려요</p>
    </div>
  </header>

  <div class="container">



    <!-- 입력 방식 -->
    <div class="card">
      <div class="section-label">입력 방식</div>
      <div class="mode-tabs">
        <button class="mode-btn active" data-mode="text" onclick="selectMode(this)">✏️ 텍스트 입력</button>
        <button class="mode-btn" data-mode="image" onclick="selectMode(this)">📷 스크린샷</button>
      </div>
      <div id="text-area">
        <textarea id="review" rows="5" placeholder="리뷰를 복사해서 붙여넣으세요..."></textarea>
      </div>
      <div id="image-area" style="display:none;">
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
          <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
          <div class="upload-icon">📸</div>
          <div class="upload-text"><strong>사진 선택</strong>하거나 끌어다 놓기</div>
        </div>
        <img id="preview-img" class="preview-img"/>
      </div>
    </div>

    <!-- 리뷰 유형 -->
    <div class="card">
      <div class="section-label">리뷰 유형</div>
      <div class="type-tabs">
        <button class="type-btn active" data-type="delivery" onclick="selectType(this)">
          <span class="t-icon">🛵</span>배달 리뷰
        </button>
        <button class="type-btn" data-type="visit" onclick="selectType(this)">
          <span class="t-icon">🚶</span>방문자 리뷰
        </button>
      </div>
    </div>

    <!-- 업종 -->
    <div class="card">
      <div class="section-label">업종</div>
      <div class="category-grid" style="grid-template-columns:repeat(4,1fr);">
        <button class="cat-btn active" data-cat="선택안함" onclick="selectCat(this)"><span class="c-icon">🔓</span>선택안함</button>
        <button class="cat-btn" data-cat="한식" onclick="selectCat(this)"><span class="c-icon">🍚</span>한식</button>
        <button class="cat-btn" data-cat="치킨" onclick="selectCat(this)"><span class="c-icon">🍗</span>치킨</button>
        <button class="cat-btn" data-cat="카페" onclick="selectCat(this)"><span class="c-icon">☕</span>카페</button>
        <button class="cat-btn" data-cat="피자" onclick="selectCat(this)"><span class="c-icon">🍕</span>피자</button>
        <button class="cat-btn" data-cat="고기집" onclick="selectCat(this)"><span class="c-icon">🥩</span>고기집</button>
        <button class="cat-btn" data-cat="패스트푸드" onclick="selectCat(this)"><span class="c-icon">🍔</span>패스트푸드</button>
        <button class="cat-btn" data-cat="분식" onclick="selectCat(this)"><span class="c-icon">🍜</span>분식</button>
        <button class="cat-btn" data-cat="일식" onclick="selectCat(this)"><span class="c-icon">🍣</span>일식</button>
        <button class="cat-btn" data-cat="양식" onclick="selectCat(this)"><span class="c-icon">🍝</span>양식</button>
        <button class="cat-btn" data-cat="족발" onclick="selectCat(this)"><span class="c-icon">🐷</span>족발</button>
      </div>
    </div>

    <!-- 별점 -->
    <div class="card" id="star-card">
      <div class="section-label">별점</div>
      <div class="star-wrap" id="star-none-wrap" style="display:none;">
        <button class="star-none-btn" id="star-none-btn" onclick="selectStarNone()">⭕ 별점 없음</button>
      </div>
      <div id="star-select">
        <div class="stars">
          <button class="star-btn" data-v="1">★</button>
          <button class="star-btn" data-v="2">★</button>
          <button class="star-btn" data-v="3">★</button>
          <button class="star-btn" data-v="4">★</button>
          <button class="star-btn active" data-v="5">★</button>
        </div>
        <div class="star-label" id="star-label">⭐⭐⭐⭐⭐ 5점</div>
      </div>
    </div>

    <!-- 사장님 한마디 -->
    <div class="card">
      <div class="section-label">우리 가게 특징 (선택)</div>
      <textarea class="owner-input" id="owner-msg" rows="2" placeholder="예) 국내산 재료만 사용, 20년 전통, 직접 만든 소스..."></textarea>
    </div>

    <!-- 키워드 -->
    <div class="card">
      <div class="section-label">넣고 싶은 키워드 (선택)</div>
      <textarea class="owner-input" id="keyword-msg" rows="2" placeholder="예) 재방문 감사, 포장 무료, 리뷰 이벤트 진행중..."></textarea>
    </div>

    <!-- 톤 선택 -->
    <div class="card">
      <div class="section-label">답글 톤</div>
      <div class="tone-tabs" style="grid-template-columns:repeat(2,1fr);">
        <button class="tone-btn active" data-tone="친절" onclick="selectTone(this)">😊 친절/다정</button>
        <button class="tone-btn" data-tone="전문" onclick="selectTone(this)">🎩 전문적/진중</button>
        <button class="tone-btn" data-tone="유머" onclick="selectTone(this)">😄 유머러스/친근</button>
        <button class="tone-btn" data-tone="사과" onclick="selectTone(this)">🙏 사과/반성</button>
      </div>
    </div>

    <!-- 길이 선택 -->
    <div class="card">
      <div class="section-label">답글 길이</div>
      <div class="length-tabs">
        <button class="length-btn" data-len="short" onclick="selectLength(this)">✂️ 짧게<br><span style="font-size:10px;font-weight:400;">2문장</span></button>
        <button class="length-btn active" data-len="medium" onclick="selectLength(this)">📝 보통<br><span style="font-size:10px;font-weight:400;">3~4문장</span></button>
        <button class="length-btn" data-len="long" onclick="selectLength(this)">📄 길게<br><span style="font-size:10px;font-weight:400;">5문장+</span></button>
      </div>
    </div>

    <button class="btn-generate" id="gen-btn" onclick="generate()">✨ AI 답글 생성</button>
    <button class="btn-cancel" id="cancel-btn" onclick="cancelGenerate()">✕ 생성 취소</button>
    <div id="err"></div>

    <!-- 결과 -->
    <div class="card" id="result-card" style="display:none;">
      <div class="section-label">생성된 답글</div>
      <textarea class="result-edit" id="result-text" oninput="updateCharCount()"></textarea>
      <div class="char-count" id="char-count"></div>
      <div class="result-actions">
        <button class="btn-copy" id="copy-btn" onclick="copyReply()">복사하기</button>
        <button class="btn-retry" onclick="generate()">다시 생성</button>
      </div>
      <button class="btn-save-fav" onclick="saveFav()">⭐ 즐겨찾기에 저장</button>
    </div>

    <!-- 즐겨찾기 -->
    <div class="card" id="fav-card" style="display:none;">
      <div class="section-label">즐겨찾기</div>
      <div id="fav-list"></div>
    </div>

    <!-- 히스토리 -->
    <div class="card" id="hist-card" style="display:none;">
      <div class="section-label">최근 기록</div>
      <div id="hist-list"></div>
    </div>

  </div>


</div>

<script>
const PASSWORD = "9999";
let star = 5, starNone = false, reviewType = 'delivery', category = '선택안함';
let tone = '친절', length = 'medium', mode = 'text';
let imgB64 = '', imgType = '';
// 12시간 경과 시 카운트 리셋
function getGenCount() {
  const lastReset = parseInt(localStorage.getItem('genResetTime')||'0');
  const now = Date.now();
  if (now - lastReset > 12 * 60 * 60 * 1000) {
    localStorage.setItem('genCount', '0');
    localStorage.setItem('genResetTime', now.toString());
    sessionStorage.removeItem('couponShown');
  }
  return parseInt(localStorage.getItem('genCount')||'0');
}
let genCount = getGenCount();
let abortController = null;

// 저장된 설정 불러오기
function loadSavedSettings() {
  const saved = JSON.parse(localStorage.getItem('userSettings')||'{}');
  if (saved.category) {
    category = saved.category;
    document.querySelectorAll('.cat-btn').forEach(b => {
      if (b.dataset.cat === category) { b.classList.add('active'); }
      else b.classList.remove('active');
    });
  }
  if (saved.tone) {
    tone = saved.tone;
    document.querySelectorAll('.tone-btn').forEach(b => {
      if (b.dataset.tone === tone) b.classList.add('active');
      else b.classList.remove('active');
    });
  }
  if (saved.length) {
    length = saved.length;
    document.querySelectorAll('.length-btn').forEach(b => {
      if (b.dataset.len === length) b.classList.add('active');
      else b.classList.remove('active');
    });
  }
}
let hist = JSON.parse(localStorage.getItem('rh')||'[]');
let favs = JSON.parse(localStorage.getItem('favs')||'[]');

const starTxt = {1:'⭐ 1점',2:'⭐⭐ 2점',3:'⭐⭐⭐ 3점',4:'⭐⭐⭐⭐ 4점',5:'⭐⭐⭐⭐⭐ 5점'};

window.onload = () => {
  unlock();

  renderHist(); renderFav();
};

let pendingGenerate = false;

function onCouponClick() {
  sessionStorage.setItem('couponShown', '1');
  document.getElementById('coupon-modal').style.display = 'none';
  window.open('https://link.coupang.com/a/egBt7O', '_blank', 'noopener');
  if (pendingGenerate) { pendingGenerate = false; generate(); }
}

function checkPw() {
  if (document.getElementById('lock-input').value === PASSWORD) { sessionStorage.setItem('ok','1'); unlock(); }
  else { document.getElementById('lock-error').textContent='비밀번호가 틀렸어요 🥲'; document.getElementById('lock-input').value=''; }
}
function unlock() { document.getElementById('lock-screen').style.display='none'; document.getElementById('app').style.display='block'; }



function selectMode(btn) {
  mode = btn.dataset.mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('text-area').style.display = mode==='text'?'block':'none';
  document.getElementById('image-area').style.display = mode==='image'?'block':'none';
}

function selectType(btn) {
  reviewType = btn.dataset.type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const noneWrap = document.getElementById('star-none-wrap');
  const starSelect = document.getElementById('star-select');
  if (reviewType === 'visit') {
    noneWrap.style.display = 'block';
  } else {
    noneWrap.style.display = 'none';
    starNone = false;
    document.getElementById('star-none-btn').classList.remove('active');
    starSelect.style.display = 'block';
  }
}

function selectStarNone() {
  starNone = !starNone;
  document.getElementById('star-none-btn').classList.toggle('active', starNone);
  document.getElementById('star-select').style.display = starNone ? 'none' : 'flex';
  if (starNone) document.getElementById('star-select').style.display = 'none';
  else document.getElementById('star-select').style.display = 'block';
}

function selectCat(btn) {
  category = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  saveSettings();
}

document.querySelectorAll('.star-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    star = parseInt(btn.dataset.v);
    starNone = false;
    document.getElementById('star-none-btn').classList.remove('active');
    document.getElementById('star-select').style.display = 'block';
    document.querySelectorAll('.star-btn').forEach(b=>b.classList.toggle('active', parseInt(b.dataset.v)<=star));
    document.getElementById('star-label').textContent = starTxt[star];
  });
});

function selectTone(btn) {
  tone = btn.dataset.tone;
  document.querySelectorAll('.tone-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  saveSettings();
}

function selectLength(btn) {
  length = btn.dataset.len;
  document.querySelectorAll('.length-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  saveSettings();
}

function saveSettings() {
  localStorage.setItem('userSettings', JSON.stringify({ category, tone, length }));
}

function handleFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    imgType = file.type; imgB64 = e.target.result.split(',')[1];
    const img = document.getElementById('preview-img');
    img.src = e.target.result; img.style.display='block';
  };
  r.readAsDataURL(file);
}

function updateCharCount() {
  const text = document.getElementById('result-text').value;
  const len = text.length;
  const el = document.getElementById('char-count');
  const limits = { delivery: 300, visit: 0 };
  const limit = reviewType === 'delivery' ? 300 : 0;
  if (limit > 0) {
    el.textContent = len + ' / ' + limit + '자';
    el.className = 'char-count ' + (len > limit ? 'over' : 'ok');
  } else {
    el.textContent = len + '자';
    el.className = 'char-count ok';
  }
}

function cancelGenerate() {
  if (abortController) { abortController.abort(); abortController = null; }
  const btn = document.getElementById('gen-btn');
  const cancelBtn = document.getElementById('cancel-btn');
  btn.disabled = false;
  btn.innerHTML = '✨ AI 답글 생성';
  cancelBtn.style.display = 'none';
}

function buildPrompt(text) {
  const typeStr = reviewType === 'delivery' ? '배달 리뷰' : '방문자 리뷰';
  const starStr = starNone ? '별점 없음' : `${star}점`;
  const ownerMsg = document.getElementById('owner-msg').value.trim();
  const ownerStr = ownerMsg ? `\n가게 특징: ${ownerMsg}` : '';
  const keywordMsg = document.getElementById('keyword-msg').value.trim();
  const keywordStr = keywordMsg ? `\n답글에 포함할 키워드: ${keywordMsg}` : '';

  const lenGuide = length === 'short' ? '2문장으로 간결하게' : length === 'medium' ? '3~4문장으로' : '5문장 이상 자세하게';

  let toneGuide = '';
  if (tone === '친절') toneGuide = '친절하고 다정한 따뜻한 말투로';
  else if (tone === '전문') toneGuide = '전문적이고 진중한 격식체로';
  else if (tone === '유머') toneGuide = '유머러스하고 친근한 편안한 말투로';
  else toneGuide = '진심으로 사과하고 반성하는 톤으로';

  let starGuide = '';
  if (starNone || reviewType === 'visit' && starNone) {
    starGuide = '리뷰 내용을 분석해서 긍정적이면 감사하게, 부정적이면 사과하는 톤으로';
  } else {
    if (star >= 4) starGuide = '감사하고 재방문/재주문을 유도하는';
    else if (star === 3) starGuide = '감사하되 더 나은 서비스를 약속하는';
    else starGuide = '진심으로 사과하고 개선 의지를 보여주는';
  }

  const startWord = reviewType === 'delivery' ? '"주문해 주셔서 감사합니다"' : '"방문해 주셔서 감사합니다"';

  // 언어 감지
  const hasKorean = /[가-힣]/.test(text);
  const hasEnglish = /[a-zA-Z]{3,}/.test(text) && !hasKorean;
  const langGuide = hasEnglish ? '리뷰가 영어로 작성되었으니 영어로 답글을 작성하세요.' : '한국어로 답글을 작성하세요.';

  return `당신은 ${category === '선택안함' ? '' : category + ' '}사장님입니다. 고객의 ${typeStr}에 답글을 작성해주세요.
별점: ${starStr}${ownerStr}${keywordStr}
고객 리뷰: ${text}

작성 지침:
- ${toneGuide} 작성
- ${starGuide} 내용으로
- ${lenGuide} 작성
- 반드시 ${startWord} 표현을 자연스럽게 포함
- "고객님"으로 시작
- 리뷰 내용에 직접 반응
- 가게 이름이나 브랜드명은 절대 언급하지 마세요
- 비슷한 의미의 감사 표현을 중복 사용하지 마세요 (예: "정말 감사합니다, 진심으로 감사합니다" 같은 중복 금지)
- 비속어, 과한 홍보성 문구(예: "최고의 맛!", "강추!", "꼭 드셔보세요!") 사용 금지
- 가독성을 위해 2~3문장마다 줄바꿈을 해주세요
- ${langGuide}
- 답글 내용만 출력`;
}

async function generate() {
  const errEl = document.getElementById('err');
  errEl.innerHTML = '';

  // 2번째 생성 시도 시 쿠팡 모달 표시 (12시간마다 리셋)
  genCount = getGenCount();
  if (genCount === 1 && !sessionStorage.getItem('couponShown')) {
    pendingGenerate = true;
    document.getElementById('coupon-modal').style.display = 'flex';
    return;
  }

  let messages = [];
  if (mode === 'image') {
    if (!imgB64) { errEl.innerHTML='<div class="error-box">스크린샷을 먼저 업로드해주세요.</div>'; return; }
    messages = [{ role:'user', content:[
      { type:'image', source:{ type:'base64', media_type:imgType, data:imgB64 } },
      { type:'text', text:`이미지의 리뷰 텍스트를 읽고 아래 지침으로 답글을 작성해주세요.\n\n${buildPrompt('[이미지의 리뷰 내용을 직접 읽어서 답글 작성]')}` }
    ]}];
  } else {
    const rv = document.getElementById('review').value.trim();
    if (!rv) { errEl.innerHTML='<div class="error-box">리뷰 내용을 입력해주세요.</div>'; return; }
    messages = [{ role:'user', content: buildPrompt(rv) }];
  }

  abortController = new AbortController();
  const btn = document.getElementById('gen-btn');
  const cancelBtn = document.getElementById('cancel-btn');
  btn.disabled=true; btn.innerHTML='<span class="loading-dots"><span></span><span></span><span></span></span>';
  cancelBtn.style.display = 'block';
  document.getElementById('result-card').style.display='none';

  try {
    const res = await fetch('/.netlify/functions/reply', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ messages }),
      signal: abortController ? abortController.signal : undefined
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error('서버 오류: ' + res.status + ' ' + errText);
    }
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const reply = data.content[0].text.trim();
    document.getElementById('result-text').value = reply;
    updateCharCount();
    document.getElementById('result-card').style.display = 'block';
    document.getElementById('copy-btn').textContent = '복사하기';
    document.getElementById('copy-btn').classList.remove('copied');

    genCount = getGenCount() + 1;
    localStorage.setItem('genCount', genCount.toString());

    const sd = starNone ? '별점없음' : '★'.repeat(star)+'☆'.repeat(5-star);
    const rv = mode==='image' ? '[스크린샷]' : (document.getElementById('review').value.slice(0,20)+'...');
    hist.unshift({ type:reviewType, cat:category, sd, review:rv, reply, time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) });
    if (hist.length>10) hist.pop();
    localStorage.setItem('rh', JSON.stringify(hist));
    renderHist();
    document.getElementById('result-card').scrollIntoView({ behavior:'smooth', block:'nearest' });
  } catch(e) {
    errEl.innerHTML=`<div class="error-box">오류: ${e.message}</div>`;
  } finally {
    btn.disabled=false; btn.innerHTML='✨ AI 답글 생성';
    document.getElementById('cancel-btn').style.display='none';
    abortController = null;
  }
}

function copyReply() {
  navigator.clipboard.writeText(document.getElementById('result-text').value).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✓ 복사됐어요!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='복사하기'; btn.classList.remove('copied'); }, 2000);
  });
}

function saveFav() {
  const text = document.getElementById('result-text').value;
  if (!text) return;
  favs.unshift({ text, time: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) });
  if (favs.length > 20) favs.pop();
  localStorage.setItem('favs', JSON.stringify(favs));
  renderFav();
  const btn = document.querySelector('.btn-save-fav');
  btn.textContent = '✓ 저장됐어요!';
  setTimeout(()=>{ btn.textContent='⭐ 즐겨찾기에 저장'; }, 1500);
}

function delFav(i) {
  favs.splice(i, 1);
  localStorage.setItem('favs', JSON.stringify(favs));
  renderFav();
}

function copyFav(i) {
  navigator.clipboard.writeText(favs[i].text);
}

function renderFav() {
  const card = document.getElementById('fav-card');
  const list = document.getElementById('fav-list');
  if (!favs.length) { card.style.display='none'; return; }
  card.style.display='block';
  list.innerHTML = favs.map((f,i)=>`
    <div class="fav-item">
      <p>${f.text}</p>
      <button class="fav-copy" onclick="copyFav(${i})">복사</button>
      <button class="fav-del" onclick="delFav(${i})">삭제</button>
    </div>`).join('');
}

function renderHist() {
  const card=document.getElementById('hist-card'), list=document.getElementById('hist-list');
  if (!hist.length) { card.style.display='none'; return; }
  card.style.display='block';
  list.innerHTML=hist.map(h=>`
    <div class="history-item">
      <div class="h-meta">
        <span class="h-tag">${h.cat||''}</span>
        <span class="h-tag">${h.type==='delivery'?'배달':'방문'}</span>
        <span class="h-stars">${h.sd||''}</span>
        <span class="h-review">${h.review}</span>
        <span class="h-time">${h.time||''}</span>
      </div>
      <div class="h-reply">${h.reply}</div>
    </div>`).join('');
}
</script>
</body>
</html>
