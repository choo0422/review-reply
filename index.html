<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="리뷰 답글">
<title>리뷰 답글 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --muted: #888880;
    --border: #E5E3DC;
    --accent: #2B5F3E;
    --accent-light: #EAF3EC;
    --accent-text: #1A3D27;
    --warn-bg: #FFF8EC;
    --warn-text: #7A4E00;
    --danger-bg: #FDECEA;
    --danger-text: #8B2020;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  header p {
    font-size: 12px;
    opacity: 0.75;
    margin-top: 2px;
  }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 12px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .stars {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
  }

  .star-btn {
    flex: 1;
    height: 44px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-size: 20px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .star-btn.active {
    background: var(--warn-bg);
    border-color: #F5C842;
  }

  .star-label {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
    min-height: 16px;
  }

  textarea {
    width: 100%;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    resize: none;
    line-height: 1.6;
    transition: border-color 0.15s;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea::placeholder { color: #BBBBBB; }

  .api-key-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .api-input {
    flex: 1;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    color: var(--text);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    transition: border-color 0.15s;
  }

  .api-input:focus { outline: none; border-color: var(--accent); }

  .btn-save {
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--accent);
    background: var(--accent-light);
    color: var(--accent-text);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .api-saved {
    font-size: 11px;
    color: var(--accent);
    margin-top: 6px;
    display: none;
  }

  .btn-generate {
    width: 100%;
    padding: 15px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 4px;
  }

  .btn-generate:active { opacity: 0.85; transform: scale(0.99); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

  .result-box {
    background: var(--accent-light);
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--accent-text);
    border: 1px solid #C5E0CC;
    margin-bottom: 12px;
    min-height: 60px;
    white-space: pre-wrap;
  }

  .result-actions {
    display: flex;
    gap: 8px;
  }

  .btn-action {
    flex: 1;
    padding: 12px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
  }

  .btn-action:active { background: var(--bg); }

  .btn-action.copied {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent-text);
  }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
    animation: dot-bounce 1.2s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .history-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .history-item:last-child { border-bottom: none; }

  .history-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .history-stars { font-size: 13px; color: #F5C842; }

  .history-review {
    font-size: 11px;
    color: var(--muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-reply {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  .notice {
    background: #FFF8EC;
    border: 1px solid #F5C842;
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--warn-text);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .error-box {
    background: var(--danger-bg);
    border-radius: var(--radius-sm);
    padding: 12px;
    font-size: 13px;
    color: var(--danger-text);
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>리뷰 답글 생성기</h1>
  <p>한식 식당 · AI 자동 답글</p>
</header>

<div class="container">

  <div class="card">
    <div class="section-label">API 키 설정</div>
    <div class="notice">
      최초 1회만 입력하면 저장돼요.<br>
      <strong>console.anthropic.com</strong> → API Keys에서 발급
    </div>
    <div class="api-key-row">
      <input class="api-input" type="password" id="api-key" placeholder="sk-ant-..." />
      <button class="btn-save" onclick="saveKey()">저장</button>
    </div>
    <div class="api-saved" id="api-saved">✓ API 키가 저장되어 있어요</div>
  </div>

  <div class="card">
    <div class="section-label">별점</div>
    <div class="stars" id="stars">
      <button class="star-btn" data-v="1">★</button>
      <button class="star-btn" data-v="2">★</button>
      <button class="star-btn" data-v="3">★</button>
      <button class="star-btn" data-v="4">★</button>
      <button class="star-btn active" data-v="5">★</button>
    </div>
    <div class="star-label" id="star-label">⭐ 5점 — 최고예요!</div>
  </div>

  <div class="card">
    <div class="section-label">리뷰 내용</div>
    <textarea id="review" rows="5" placeholder="쿠팡이츠 앱에서 리뷰를 복사해서 붙여넣으세요..."></textarea>
  </div>

  <button class="btn-generate" id="gen-btn" onclick="generateReply()">
    AI 답글 생성
  </button>

  <div id="error-area"></div>

  <div class="card" id="result-card" style="display:none;">
    <div class="section-label">생성된 답글</div>
    <div class="result-box" id="result-text"></div>
    <div class="result-actions">
      <button class="btn-action" id="copy-btn" onclick="copyReply()">복사하기</button>
      <button class="btn-action" onclick="regenerate()">다시 생성</button>
    </div>
  </div>

  <div class="card" id="history-card" style="display:none;">
    <div class="section-label">최근 기록</div>
    <div id="history-list"></div>
  </div>

</div>

<script>
let selectedStar = 5;
let lastReview = '';
let history = JSON.parse(localStorage.getItem('reply_history') || '[]');

const starLabels = {
  1: '⭐ 1점 — 많이 속상하셨겠어요',
  2: '⭐ 2점 — 아쉬운 점이 있으셨군요',
  3: '⭐ 3점 — 무난하셨나봐요',
  4: '⭐ 4점 — 맛있게 드셨군요!',
  5: '⭐ 5점 — 최고예요!'
};

window.onload = () => {
  const savedKey = localStorage.getItem('anthropic_key');
  if (savedKey) {
    document.getElementById('api-key').value = savedKey;
    document.getElementById('api-saved').style.display = 'block';
  }
  renderHistory();
};

document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedStar = parseInt(btn.dataset.v);
    document.querySelectorAll('.star-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.v) <= selectedStar);
    });
    document.getElementById('star-label').textContent = starLabels[selectedStar];
  });
});

function saveKey() {
  const key = document.getElementById('api-key').value.trim();
  if (!key) return;
  localStorage.setItem('anthropic_key', key);
  const saved = document.getElementById('api-saved');
  saved.style.display = 'block';
  saved.textContent = '✓ 저장됐어요!';
  setTimeout(() => { saved.textContent = '✓ API 키가 저장되어 있어요'; }, 1500);
}

async function generateReply() {
  const review = document.getElementById('review').value.trim();
  const apiKey = localStorage.getItem('anthropic_key') || document.getElementById('api-key').value.trim();
  const errorArea = document.getElementById('error-area');

  errorArea.innerHTML = '';

  if (!apiKey) {
    errorArea.innerHTML = '<div class="error-box">API 키를 먼저 입력하고 저장해주세요.</div>';
    return;
  }
  if (!review) {
    errorArea.innerHTML = '<div class="error-box">리뷰 내용을 입력해주세요.</div>';
    return;
  }

  lastReview = review;
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';

  const resultCard = document.getElementById('result-card');
  resultCard.style.display = 'none';

  let toneGuide = '';
  if (selectedStar >= 4) toneGuide = '감사하고 따뜻한 톤으로, 재방문을 유도하는 답글을 작성하세요.';
  else if (selectedStar === 3) toneGuide = '감사함을 표하되, 더 나은 서비스를 약속하는 답글을 작성하세요.';
  else toneGuide = '진심으로 사과하고, 구체적인 개선 의지를 보여주는 답글을 작성하세요.';

  const prompt = `당신은 한식 식당 사장님입니다. 고객의 리뷰에 정중하고 진심 어린 답글을 작성해주세요.

식당 특징: 항상 신선한 재료를 사용하는 한식 전문점

리뷰 별점: ${selectedStar}점
고객 리뷰: ${review}

작성 지침:
- ${toneGuide}
- 정중하고 격식 있는 말투 사용 (합쇼체)
- 2~4문장으로 간결하게 작성
- 신선한 재료에 대한 자부심을 자연스럽게 녹여내기
- "고객님"으로 시작하기
- 답글 내용만 출력하고 다른 설명은 쓰지 마세요`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();

    if (data.error) {
      throw new Error(data.error.message);
    }

    const reply = data.content[0].text.trim();
    document.getElementById('result-text').textContent = reply;
    resultCard.style.display = 'block';
    document.getElementById('copy-btn').textContent = '복사하기';
    document.getElementById('copy-btn').classList.remove('copied');

    history.unshift({ star: selectedStar, review: review.slice(0, 25) + (review.length > 25 ? '...' : ''), reply, time: new Date().toLocaleTimeString('ko-KR', {hour: '2-digit', minute: '2-digit'}) });
    if (history.length > 10) history.pop();
    localStorage.setItem('reply_history', JSON.stringify(history));
    renderHistory();

    resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  } catch (e) {
    errorArea.innerHTML = `<div class="error-box">오류: ${e.message}<br>API 키를 확인해주세요.</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'AI 답글 생성';
  }
}

function regenerate() {
  document.getElementById('review').value = lastReview;
  generateReply();
}

function copyReply() {
  const text = document.getElementById('result-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ 복사됐어요!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '복사하기';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function renderHistory() {
  const card = document.getElementById('history-card');
  const list = document.getElementById('history-list');
  if (history.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <div class="history-meta">
        <span class="history-stars">${'★'.repeat(h.star)}${'☆'.repeat(5 - h.star)}</span>
        <span class="history-review">${h.review}</span>
        <span style="font-size:11px;color:var(--muted)">${h.time || ''}</span>
      </div>
      <div class="history-reply">${h.reply}</div>
    </div>
  `).join('');
}
</script>
</body>
</html>
