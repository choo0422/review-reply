<style>
:root {
  --coral: #FF6B6B; --coral-light: #FFF0F0; --coral-dark: #CC4444;
  --mint: #4ECDC4; --mint-light: #E8FAF9; --mint-dark: #2EA89F;
  --yellow: #FFE66D; --yellow-light: #FFFBEA; --yellow-dark: #CCA800;
  --purple: #A855F7; --purple-light: #F5EEFF;
  --bg: #FAFAF8; --card: #FFFFFF; --text: #1A1A1A; --muted: #999;
  --border: #EBEBEB; --radius: 18px; --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 48px; }

/* 잠금화면 */
.lock-screen {
  position: fixed; inset: 0; z-index: 200;
  background: linear-gradient(145deg, #FF6B6B 0%, #FF8E53 40%, #FFE66D 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px;
}
.lock-logo { font-size: 56px; margin-bottom: 8px; animation: bounce 1.5s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.lock-title { font-size: 32px; font-weight: 900; color: white; letter-spacing: -1px; margin-bottom: 4px; text-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.lock-sub { font-size: 14px; color: rgba(255,255,255,0.85); margin-bottom: 40px; }
.lock-box { background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.lock-box p { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; text-align: center; letter-spacing: 0.5px; }
.lock-input { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: 2px solid var(--border); font-size: 18px; font-family: 'Noto Sans KR', sans-serif; text-align: center; letter-spacing: 6px; color: var(--text); transition: border-color 0.15s; margin-bottom: 12px; }
.lock-input:focus { outline: none; border-color: var(--coral); }
.lock-btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.lock-error { font-size: 12px; color: var(--coral); text-align: center; margin-top: 8px; min-height: 18px; }

/* 헤더 */
header {
  background: white; border-bottom: 1px solid var(--border);
  padding: 16px 20px; position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 10px;
}
.header-emoji { font-size: 28px; }
.header-text h1 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }
.header-text p { font-size: 11px; color: var(--muted); margin-top: 1px; }

.container { padding: 16px; max-width: 480px; margin: 0 auto; }

/* 카드 */
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 18px; margin-bottom: 12px; }
.section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

/* API 입력 */
.api-notice { background: var(--yellow-light); border: 1.5px solid var(--yellow); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: var(--yellow-dark); line-height: 1.6; margin-bottom: 12px; }
.api-row { display: flex; gap: 8px; }
.api-input { flex: 1; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text); background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; transition: border-color 0.15s; }
.api-input:focus { outline: none; border-color: var(--mint); }
.btn-api-save { padding: 10px 14px; border-radius: var(--radius-sm); border: none; background: var(--mint); color: white; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; }
.api-ok { font-size: 11px; color: var(--mint-dark); margin-top: 6px; display: none; }

/* 모드 탭 */
.mode-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mode-btn { padding: 12px 8px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: var(--muted); transition: all 0.15s; text-align: center; }
.mode-btn.active { border-color: var(--coral); background: var(--coral-light); color: var(--coral-dark); }

/* 이미지 업로드 */
.upload-area { border: 2.5px dashed var(--border); border-radius: var(--radius-sm); padding: 28px 16px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); }
.upload-area:hover, .upload-area.drag-over { border-color: var(--mint); background: var(--mint-light); }
.upload-area input { display: none; }
.upload-icon { font-size: 36px; margin-bottom: 8px; }
.upload-text { font-size: 14px; color: var(--muted); }
.upload-text strong { color: var(--mint-dark); }
.preview-img { width: 100%; border-radius: var(--radius-sm); margin-top: 12px; display: none; max-height: 280px; object-fit: contain; border: 1px solid var(--border); }

/* 플랫폼 탭 */
.platform-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.platform-btn { padding: 10px 4px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: var(--muted); transition: all 0.15s; text-align: center; line-height: 1.4; }
.platform-btn .p-emoji { display: flex; justify-content: center; margin-bottom: 4px; }
.platform-btn.active.coupang { background: #E8F4FF; border-color: #1A73E8; color: #1A4FAA; }
.platform-btn.active.baemin { background: #E8FFFE; border-color: #2AC1BC; color: #1A8A87; }
.platform-btn.active.naver { background: #E8FFE8; border-color: #03C75A; color: #027A38; }
.naver-badge { display: none; background: #E8FFE8; border: 1px solid #03C75A; border-radius: var(--radius-sm); padding: 8px 12px; font-size: 12px; color: #027A38; margin-top: 10px; }

/* 별점 */
.star-card.hidden { display: none; }
.stars { display: flex; gap: 6px; }
.star-btn { flex: 1; height: 48px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--bg); font-size: 22px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.star-btn.active { background: var(--yellow-light); border-color: var(--yellow); }
.star-label { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }

/* 텍스트 입력 */
textarea { width: 100%; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 12px; resize: none; line-height: 1.7; transition: border-color 0.15s; }
textarea:focus { outline: none; border-color: var(--coral); }
textarea::placeholder { color: #CCC; }

/* 생성 버튼 */
.btn-generate {
  width: 100%; padding: 16px; border-radius: var(--radius); border: none;
  background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
  color: white; font-size: 16px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; margin-top: 4px;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 4px 20px rgba(255,107,107,0.35);
}
.btn-generate:active { opacity: 0.9; transform: scale(0.99); }
.btn-generate:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

/* 결과 */
.result-box {
  background: linear-gradient(135deg, var(--mint-light), #F0FFFE);
  border-radius: var(--radius-sm); padding: 16px;
  font-size: 14px; line-height: 1.9; color: #1A3D3A;
  border: 1.5px solid #B2E8E5; margin-bottom: 14px; white-space: pre-wrap;
}
.result-actions { display: flex; gap: 8px; }
.btn-copy { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: none; background: var(--mint); color: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: background 0.15s; }
.btn-copy.copied { background: var(--mint-dark); }
.btn-retry { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: white; color: var(--text); font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

/* 로딩 */
.loading-dots { display: inline-flex; gap: 5px; align-items: center; }
.loading-dots span { width: 7px; height: 7px; border-radius: 50%; background: white; animation: db 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes db { 0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1} }

/* 에러 */
.error-box { background: var(--coral-light); border-radius: var(--radius-sm); padding: 12px; font-size: 13px; color: var(--coral-dark); margin-bottom: 12px; border: 1px solid #FFD0D0; }

/* 히스토리 */
.history-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.history-item:last-child { border-bottom: none; }
.history-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.h-stars { font-size: 12px; color: #F5C842; }
.h-platform { font-size: 10px; padding: 3px 7px; border-radius: 20px; font-weight: 700; }
.pt-coupang { background:#E8F4FF;color:#1A4FAA; }
.pt-baemin { background:#E8FFFE;color:#1A8A87; }
.pt-naver { background:#E8FFE8;color:#027A38; }
.h-review { font-size: 11px; color: var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.h-time { font-size: 11px; color: var(--muted); }
.h-reply { font-size: 13px; color: var(--text); line-height: 1.6; }

/* 구분선 태그 */
.divider-tag { text-align: center; margin: 4px 0 16px; }
.divider-tag span { font-size: 11px; color: var(--muted); background: var(--bg); padding: 0 10px; }
</style>
</head>

<!-- 잠금화면 -->

  <div class="container">

              <circle cx="121" cy="92" r="3" fill="white"/>
              <!-- 입 -->
              <path d="M85 115 Q100 128 115 115" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
              <!-- 배민 글자 -->
              <text x="100" y="175" font-size="32" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" fill="white">배민</text>
            </svg>
          </span>
          <span style="font-size:10px;display:block;margin-top:2px;">배달의민족</span>
        </button>
        <button class="platform-btn naver" data-p="naver" onclick="selectPlatform(this)">
          <span class="p-emoji">
            <svg width="36" height="36" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#00DE5A"/>
                  <stop offset="100%" style="stop-color:#00C73C"/>
                </linearGradient>
              </defs>
              <rect width="200" height="200" rx="36" fill="url(#ng)"/>
              <path d="M42 155V45h46l52 70V45h46v110H140L88 85v70H42z" fill="white"/>
            </svg>
          </span>
          <span style="font-size:10px;display:block;margin-top:2px;">네이버 리뷰</span>
        </button>
      </div>
      <div class="naver-badge" id="naver-badge">⭐ 별점 없이 리뷰 내용을 분석해서 답글을 생성해요</div>
    </div>

    <!-- 별점 -->
    <div class="card star-card" id="star-card">
      <div class="section-label">별점</div>
      <div class="stars">
        <button class="star-btn" data-v="1">★</button>
        <button class="star-btn" data-v="2">★</button>
        <button class="star-btn" data-v="3">★</button>
        <button class="star-btn" data-v="4">★</button>
        <button class="star-btn active" data-v="5">★</button>
      </div>
      <div class="star-label" id="star-label">⭐⭐⭐⭐⭐ 5점 — 최고예요!</div>
    </div>

    <button class="btn-generate" id="gen-btn" onclick="generate()">✨ AI 답글 생성</button>
    <div id="err"></div>

    <!-- 결과 -->
    <div class="card" id="result-card" style="display:none;">
      <div class="section-label">생성된 답글</div>
      <div class="result-box" id="result-text"></div>
      <div class="result-actions">
        <button class="btn-copy" id="copy-btn" onclick="copyReply()">복사하기</button>
        <button class="btn-retry" onclick="generate()">다시 생성</button>
      </div>
    </div>

    <!-- 히스토리 -->
    <div class="card" id="hist-card" style="display:none;">
      <div class="section-label">최근 기록</div>
      <div id="hist-list"></div>
    </div>

  </div>
</div>

<script>
const PASSWORD = "9999";
const API_KEY = localStorage.getItem('ak') || '';
const pNames = { coupang:'쿠팡이츠', baemin:'배달의민족', naver:'네이버 리뷰' };
const starTxt = { 1:'⭐ 1점',2:'⭐⭐ 2점',3:'⭐⭐⭐ 3점',4:'⭐⭐⭐⭐ 4점',5:'⭐⭐⭐⭐⭐ 5점 — 최고예요!' };
let star=5, platform='coupang', mode='text', imgB64='', imgType='', lastReview='';
let genCount = parseInt(localStorage.getItem('genCount')||'0');
let hist = JSON.parse(localStorage.getItem('rh')||'[]');

window.onload = () => {
  if (sessionStorage.getItem('ok')==='1') unlock();
  const k = localStorage.getItem('ak');
  if (k) { document.getElementById('api-key').value=k; document.getElementById('api-ok').style.display='block'; }
  renderHist();
};

function checkPw() {
  if (document.getElementById('lock-input').value === PASSWORD) { sessionStorage.setItem('ok','1'); unlock(); }
  else { document.getElementById('lock-error').textContent='비밀번호가 틀렸어요 🥲'; document.getElementById('lock-input').value=''; }
}
function unlock() { document.getElementById('lock-screen').style.display='none'; document.getElementById('app').style.display='block'; }

function saveKey() {
  const k = document.getElementById('api-key').value.trim();
  if (!k) return;
  localStorage.setItem('ak', k);
  const el = document.getElementById('api-ok');
  el.style.display='block'; el.textContent='✓ 저장됐어요!';
  setTimeout(()=>{ el.textContent='✓ API 키 저장됨'; }, 1500);
}

function selectMode(btn) {
  mode = btn.dataset.mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('text-area').style.display = mode==='text'?'block':'none';
  document.getElementById('image-area').style.display = mode==='image'?'block':'none';
}

function selectPlatform(btn) {
  platform = btn.dataset.p;
  document.querySelectorAll('.platform-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const isNaver = platform==='naver';
  document.getElementById('star-card').classList.toggle('hidden', isNaver);
  document.getElementById('naver-badge').style.display = isNaver?'block':'none';
}

document.querySelectorAll('.star-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    star = parseInt(btn.dataset.v);
    document.querySelectorAll('.star-btn').forEach(b=>b.classList.toggle('active', parseInt(b.dataset.v)<=star));
    document.getElementById('star-label').textContent = starTxt[star];
  });
});

function handleFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    imgType = file.type; imgB64 = e.target.result.split(',')[1];
    const img = document.getElementById('preview-img');
    img.src = e.target.result; img.style.display='block';
  };
  r.readAsDataURL(file);
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-area').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) handleFile(f);
}

function buildPrompt(text) {
  if (platform==='naver') return `당신은 한식 식당 사장님입니다. 네이버 방문자 리뷰에 정중하고 진심 어린 답글을 작성해주세요.
고객 리뷰: ${text}
작성 지침:
- 리뷰 내용을 분석하여 긍정적이면 감사하게, 부정적이면 진심으로 사과하고 개선 의지 표현
- 반드시 "방문해 주셔서 감사합니다" 또는 "찾아주셔서 감사합니다" 포함
- 정중한 합쇼체
- 최소 50자 이상, 리뷰가 길면 그에 맞게 길게
- "고객님"으로 시작
- 리뷰 내용에 직접 반응
- 답글만 출력`;

  const tone = star>=4 ? '감사하고 친근하면서 따뜻하게, 재주문을 유도하세요.' : star===3 ? '친근하게 감사하되 더 잘하겠다고 약속하세요.' : '진심으로 사과하고 구체적 개선 의지를 보여주세요.';
  return `당신은 한식 식당 사장님입니다. ${pNames[platform]} 배달 리뷰에 친근하고 정중한 답글을 작성해주세요.
식당: 항상 신선한 재료를 사용하는 한식 전문점 "추씨네"
별점: ${star}점 / 리뷰: ${text}
작성 지침:
- ${tone}
- 반드시 "주문해 주셔서 감사합니다" 포함
- 친근하면서 정중한 합쇼체
- 최소 50자 이상, 리뷰가 길면 그에 맞게 길게
- "고객님"으로 시작
- 리뷰 내용에 직접 반응
- 답글만 출력`;
}

async function generate() {
  const apiKey = localStorage.getItem('ak') || document.getElementById('api-key').value.trim();
  const errEl = document.getElementById('err');
  errEl.innerHTML = '';
  if (!apiKey) { errEl.innerHTML='<div class="error-box">API 키를 먼저 입력하고 저장해주세요.</div>'; return; }

  let messages = [];
  if (mode==='image') {
    if (!imgB64) { errEl.innerHTML='<div class="error-box">스크린샷을 먼저 업로드해주세요.</div>'; return; }
    messages = [{ role:'user', content:[
      { type:'image', source:{ type:'base64', media_type:imgType, data:imgB64 } },
      { type:'text', text:`이미지의 리뷰 텍스트를 읽고 아래 지침으로 답글을 작성해주세요.\n\n${buildPrompt('[이미지의 리뷰 내용을 직접 읽어서 답글 작성]')}` }
    ]}];
  } else {
    const rv = document.getElementById('review').value.trim();
    if (!rv) { errEl.innerHTML='<div class="error-box">리뷰 내용을 입력해주세요.</div>'; return; }
    lastReview = rv;
    messages = [{ role:'user', content: buildPrompt(rv) }];
  }

  const btn = document.getElementById('gen-btn');
  btn.disabled=true; btn.innerHTML='<span class="loading-dots"><span></span><span></span><span></span></span>';
  document.getElementById('result-card').style.display='none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({ model:'claude-opus-4-5', max_tokens:600, messages })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content[0].text.trim();
    document.getElementById('result-text').textContent = reply;
    document.getElementById('result-card').style.display = 'block';
    document.getElementById('copy-btn').textContent = '복사하기';
    document.getElementById('copy-btn').classList.remove('copied');

    const sd = platform==='naver'?'분석':'★'.repeat(star)+'☆'.repeat(5-star);
    hist.unshift({ star, platform, sd, review: mode==='image'?'[스크린샷]':(lastReview.slice(0,25)+(lastReview.length>25?'...':'')), reply, time: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) });
    if (hist.length>10) hist.pop();
    localStorage.setItem('rh', JSON.stringify(hist));
    renderHist();
    document.getElementById('result-card').scrollIntoView({ behavior:'smooth', block:'nearest' });
    genCount++;
    localStorage.setItem('genCount', genCount);
    if (genCount % 4 === 0) {
      setTimeout(() => {
        window.open('https://link.coupang.com/a/efkMur', '_blank', 'noopener');
      }, 1500);
    }
  } catch(e) {
    errEl.innerHTML=`<div class="error-box">오류: ${e.message}</div>`;
  } finally {
    btn.disabled=false; btn.innerHTML='✨ AI 답글 생성';
  }
}

function copyReply() {
  navigator.clipboard.writeText(document.getElementById('result-text').textContent).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✓ 복사됐어요!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='복사하기'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderHist() {
  const card=document.getElementById('hist-card'), list=document.getElementById('hist-list');
  if (!hist.length) { card.style.display='none'; return; }
  card.style.display='block';
  list.innerHTML=hist.map(h=>`
    <div class="history-item">
      <div class="history-meta">
        <span class="h-stars">${h.sd||('★'.repeat(h.star)+'☆'.repeat(5-h.star))}</span>
        <span class="h-platform pt-${h.platform}">${pNames[h.platform]||''}</span>
        <span class="h-review">${h.review}</span>
        <span class="h-time">${h.time||''}</span>
      </div>
      <div class="h-reply">${h.reply}</div>
    </div>`).join('');
}
</script>
</body>
</html>
