<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- 배경 그라디언트 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="60%" stop-color="#0D2044"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <!-- 골드 그라디언트 -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <!-- 블루 글로우 -->
    <linearGradient id="blueGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A9FFF"/>
      <stop offset="100%" stop-color="#1A6FFF"/>
    </linearGradient>
    <!-- 폰 화면 그라디언트 -->
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D2A5E"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <!-- 카드 그라디언트 -->
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A3A6E"/>
      <stop offset="100%" stop-color="#0D2A5E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 배경 장식 원 (은은한 블루) -->
  <circle cx="950" cy="80" r="280" fill="#1A3A7E" fill-opacity="0.15"/>
  <circle cx="100" cy="550" r="200" fill="#1A3A7E" fill-opacity="0.1"/>
  <circle cx="600" cy="315" r="400" fill="#0D2A5E" fill-opacity="0.2"/>

  <!-- 상단 얇은 골드 라인 -->
  <rect x="80" y="52" width="120" height="3" rx="2" fill="url(#gold)"/>

  <!-- ── 왼쪽: 텍스트 영역 ── -->

  <!-- 상단 뱃지 -->
  <rect x="80" y="72" width="180" height="32" rx="16" fill="#1A3A7E"/>
  <text x="170" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#4A9FFF" letter-spacing="1">AI POWERED</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="185" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="62" font-weight="900" fill="#FFFFFF" letter-spacing="-1">리뷰 답글</text>
  <text x="80" y="260" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="62" font-weight="900" fill="url(#gold)" letter-spacing="-1">자동 생성기</text>

  <!-- 서브 타이틀 -->
  <text x="80" y="310" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="22" fill="#8AAFD4" letter-spacing="0">사장님을 위한 AI 답글 도우미</text>

  <!-- 구분선 -->
  <rect x="80" y="338" width="420" height="1" fill="#1A3A7E"/>

  <!-- 특징 태그들 -->
  <!-- 태그 1 -->
  <rect x="80" y="358" width="116" height="34" rx="17" fill="#0D2A5E" stroke="#1A6FFF" stroke-width="1.5"/>
  <text x="138" y="380" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="13" fill="#4A9FFF" font-weight="600">⚡ 즉시 생성</text>

  <!-- 태그 2 -->
  <rect x="206" y="358" width="116" height="34" rx="17" fill="#0D2A5E" stroke="#1A6FFF" stroke-width="1.5"/>
  <text x="264" y="380" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="13" fill="#4A9FFF" font-weight="600">🎯 업종 맞춤</text>

  <!-- 태그 3 -->
  <rect x="332" y="358" width="116" height="34" rx="17" fill="#0D2A5E" stroke="#FFD700" stroke-width="1.5"/>
  <text x="390" y="380" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="13" fill="#FFD700" font-weight="600">👑 프리미엄</text>

  <!-- 별점 5개 -->
  <text x="80" y="440" font-family="Arial" font-size="32" fill="#FFD700">★★★★★</text>
  <text x="255" y="440" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="18" fill="#8AAFD4">사장님들의 선택</text>

  <!-- URL -->
  <text x="80" y="490" font-family="Arial, monospace" font-size="15" fill="#4A9FFF" opacity="0.7">review-reply-psi.vercel.app</text>

  <!-- 하단 슬로건 -->
  <rect x="80" y="520" width="440" height="50" rx="12" fill="#0D2A5E" fill-opacity="0.8"/>
  <text x="300" y="550" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="17" fill="#FFFFFF" font-weight="600">배달·방문 리뷰 답글, 3초면 끝!</text>

  <!-- ── 오른쪽: 스마트폰 목업 ── -->
  <!-- 폰 외부 쉐도우 효과 -->
  <rect x="700" y="60" width="260" height="510" rx="36" fill="#0A1628" fill-opacity="0.6"/>

  <!-- 폰 바디 -->
  <rect x="690" y="50" width="260" height="510" rx="36" fill="#0D1F3C" stroke="#1A3A7E" stroke-width="2"/>

  <!-- 폰 노치 -->
  <rect x="780" y="62" width="80" height="18" rx="9" fill="#080F1E"/>

  <!-- 폰 화면 영역 -->
  <rect x="702" y="88" width="236" height="456" rx="4" fill="url(#phoneScreen)"/>

  <!-- 앱 헤더 -->
  <rect x="702" y="88" width="236" height="48" rx="4" fill="#0A1E42"/>
  <text x="726" y="118" font-family="Arial" font-size="16">🍽️</text>
  <text x="750" y="116" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">리뷰 답글 생성기</text>
  <text x="750" y="130" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="9" fill="#4A9FFF">AI 맞춤 답글</text>

  <!-- 섹션 1: 업종 선택 -->
  <rect x="710" y="146" width="220" height="16" rx="4" fill="#0D2A5E"/>
  <text x="720" y="158" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="9" fill="#4A9FFF" font-weight="700">업종 선택</text>

  <!-- 업종 칩 -->
  <rect x="710" y="167" width="66" height="44" rx="8" fill="#0A1E42" stroke="#1A6FFF" stroke-width="1.5"/>
  <text x="743" y="185" text-anchor="middle" font-family="Arial" font-size="16">🍽️</text>
  <text x="743" y="205" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="8" fill="#4A9FFF" font-weight="700">식사/요리</text>

  <rect x="784" y="167" width="66" height="44" rx="8" fill="#0A1E42"/>
  <text x="817" y="185" text-anchor="middle" font-family="Arial" font-size="16">🛵</text>
  <text x="817" y="205" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="8" fill="#8AAFD4">배달 인기</text>

  <rect x="858" y="167" width="66" height="44" rx="8" fill="#0A1E42"/>
  <text x="891" y="185" text-anchor="middle" font-family="Arial" font-size="16">☕</text>
  <text x="891" y="205" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="8" fill="#8AAFD4">카페/간식</text>

  <!-- 섹션 2: 답글 유형 -->
  <rect x="710" y="222" width="220" height="16" rx="4" fill="#0D2A5E"/>
  <text x="720" y="234" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="9" fill="#4A9FFF" font-weight="700">답글 유형</text>

  <rect x="710" y="242" width="66" height="32" rx="6" fill="#0A1E42"/>
  <text x="743" y="263" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="8" fill="#8AAFD4">✂️ 간단</text>

  <rect x="784" y="242" width="66" height="32" rx="6" fill="#0D2A5E" stroke="#1A9FFF" stroke-width="1.5"/>
  <text x="817" y="263" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="8" fill="#4A9FFF" font-weight="700">📝 정성</text>

  <rect x="858" y="242" width="66" height="32" rx="6" fill="#1A2A0A" stroke="#FFD700" stroke-width="1.5"/>
  <text x="891" y="263" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="8" fill="#FFD700" font-weight="700">👑 프리미엄</text>

  <!-- 구분선 -->
  <rect x="710" y="284" width="220" height="1" fill="#1A3A7E" opacity="0.5"/>

  <!-- 생성 결과 카드 -->
  <rect x="710" y="292" width="220" height="110" rx="8" fill="#0A1E42"/>
  <text x="720" y="308" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="8" fill="#4A9FFF" font-weight="700">✨ 생성된 답글</text>

  <!-- 텍스트 라인들 (답글 미리보기) -->
  <rect x="720" y="316" width="160" height="7" rx="3" fill="#1A3A7E"/>
  <rect x="720" y="329" width="180" height="7" rx="3" fill="#1A3A7E"/>
  <rect x="720" y="342" width="140" height="7" rx="3" fill="#1A3A7E"/>
  <rect x="720" y="355" width="170" height="7" rx="3" fill="#1A3A7E"/>
  <rect x="720" y="368" width="120" height="7" rx="3" fill="#1A3A7E"/>

  <!-- 복사 버튼 -->
  <rect x="720" y="384" width="100" height="10" rx="5" fill="url(#blueGlow)" opacity="0.8"/>
  <text x="770" y="393" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="7" fill="#FFFFFF" font-weight="700">복사하기</text>

  <!-- 생성 버튼 -->
  <rect x="710" y="412" width="220" height="38" rx="10" fill="url(#blueGlow)"/>
  <text x="820" y="436" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="13" font-weight="900" fill="#FFFFFF">✨ AI 답글 생성</text>

  <!-- 하단 배너 -->
  <rect x="702" y="458" width="236" height="30" rx="4" fill="#080F1E"/>
  <text x="820" y="478" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="9" fill="#4A9FFF">🛒 사장님 맞춤 특가</text>

  <!-- 폰 홈버튼 라인 -->
  <rect x="800" y="548" width="40" height="4" rx="2" fill="#1A3A7E"/>

  <!-- 오른쪽 상단 별 장식 -->
  <text x="670" y="100" font-family="Arial" font-size="24" fill="#FFD700" opacity="0.3">★</text>
  <text x="645" y="140" font-family="Arial" font-size="14" fill="#FFD700" opacity="0.2">★</text>

  <!-- 하단 워터마크 라인 -->
  <rect x="0" y="610" width="1200" height="20" fill="#080F1E" fill-opacity="0.5"/>
  <text x="600" y="624" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="11" fill="#4A9FFF" opacity="0.6">AI 리뷰 답글 생성기 · 자영업 사장님을 위한 스마트 솔루션</text>
</svg>
